
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADSESPAÇOLASER</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='9' fill='%230284c7'/><path d='M7 9h18v11H7z M12 25h8 M16 20v5' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='9' fill='%230284c7'/><path d='M7 9h18v11H7z M12 25h8 M16 20v5' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="manifest" href="manifest.json">

    <script>
      // Early shim para evitar erros de 'process is not defined'
      window.process = { 
        env: { 
          API_KEY: '',
          NODE_ENV: 'production'
        } 
      };
      
      // Captura erros globais de carregamento
      window.addEventListener('error', function(e) {
        console.error('Erro detectado:', e.error || e.message);
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = `<div style="padding: 40px; color: #ef4444; font-family: sans-serif; text-align: center; background: #020617; min-height: 100vh;">
            <div style="max-width: 400px; margin: 0 auto; padding-top: 100px;">
              <h1 style="font-size: 18px; font-weight: 900; color: white; margin-bottom: 10px; letter-spacing: -0.05em;">SISTEMA INDISPONÍVEL</h1>
              <p style="font-size: 12px; color: #94a3b8; line-height: 1.6;">${e.message || 'Erro crítico de inicialização das bibliotecas.'}</p>
              <button onclick="localStorage.clear(); location.reload();" style="margin-top: 24px; padding: 12px 24px; background: #0284c7; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;">Limpar Cache e Reiniciar</button>
            </div>
          </div>`;
        }
      });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
      
      #root:empty::before {
        content: 'ADS ESPAÇOLASER - CARREGANDO...';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #334155;
        font-size: 10px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>

    <script type="importmap">
{

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
